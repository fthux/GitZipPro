<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitZip Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      color-scheme: light dark;
      /* Light theme variables */
      --bg-color: #f8f9fa;
      --text-main: #202124;
      --text-scnd: #5f6368;
      --border-color: #dadce0;
      --header-border: #dadce0;
      --dot-active: #3fb950;
      --dot-inactive: #6e7681;
      --dot-shadow: rgba(63, 185, 80, 0.6);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0d1117;
        --text-main: #e6edf3;
        --text-scnd: #8b949e;
        --border-color: #21262d;
        --header-border: #21262d;
        --dot-active: #3fb950;
        --dot-inactive: #6e7681;
        --dot-shadow: rgba(63, 185, 80, 0.6);
      }
    }

    html[data-theme="light"] {
      color-scheme: light;
      --bg-color: #f8f9fa;
      --text-main: #202124;
      --text-scnd: #5f6368;
      --border-color: #dadce0;
      --header-border: #dadce0;
      --dot-active: #3fb950;
      --dot-inactive: #6e7681;
      --dot-shadow: rgba(63, 185, 80, 0.6);
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg-color: #0d1117;
      --text-main: #e6edf3;
      --text-scnd: #8b949e;
      --border-color: #21262d;
      --header-border: #21262d;
      --dot-active: #3fb950;
      --dot-inactive: #6e7681;
      --dot-shadow: rgba(63, 185, 80, 0.6);
    }

    body {
      width: 280px;
      min-height: 120px;
      background: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      transition: background-color 0.2s, color 0.2s;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--header-border);
    }

    header img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.01em;
    }

    .version {
      font-size: 11px;
      color: var(--text-scnd);
      margin-top: 1px;
    }

    main {
      padding: 14px 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dot-active);
      flex-shrink: 0;
      box-shadow: 0 0 6px var(--dot-shadow);
    }

    .dot.inactive {
      background: var(--dot-inactive);
      box-shadow: none;
    }

    #status-text {
      color: var(--text-scnd);
      font-size: 12px;
    }


  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="GitZip Pro icon" />
    <div>
      <div class="title">GitZip Pro</div>
      <div class="version">v0.1.0</div>
    </div>
  </header>

  <main>
    <div class="status-row">
      <div class="dot inactive" id="status-dot"></div>
      <span id="status-text">Not on a GitHub repo page</span>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
