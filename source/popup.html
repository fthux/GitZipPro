<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitZip Pro</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      min-height: 120px;
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #21262d;
    }

    header img {
      width: 32px;
      height: 32px;
      border-radius: 6px;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      color: #e6edf3;
      letter-spacing: -0.01em;
    }

    .version {
      font-size: 11px;
      color: #6e7681;
      margin-top: 1px;
    }

    main {
      padding: 14px 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      flex-shrink: 0;
      box-shadow: 0 0 6px rgba(63, 185, 80, 0.6);
    }

    .dot.inactive {
      background: #6e7681;
      box-shadow: none;
    }

    #status-text {
      color: #8b949e;
      font-size: 12px;
    }

    .hint {
      color: #6e7681;
      font-size: 11.5px;
      line-height: 1.55;
      border-top: 1px solid #21262d;
      padding-top: 10px;
      margin-top: 4px;
    }

    .hint strong {
      color: #8b949e;
    }

    footer {
      padding: 8px 16px 12px;
      text-align: center;
    }

    footer a {
      color: #388bfd;
      text-decoration: none;
      font-size: 11px;
    }

    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="GitZip Pro icon" />
    <div>
      <div class="title">GitZip Pro</div>
      <div class="version">v0.1.0</div>
    </div>
  </header>

  <main>
    <div class="status-row">
      <div class="dot inactive" id="status-dot"></div>
      <span id="status-text">Not on a GitHub repo page</span>
    </div>
    <p class="hint">
      Navigate to a <strong>GitHub repository</strong>, then hover over any
      file or folder to reveal a checkbox. Select items and click the
      <strong>Download</strong> button that appears at the bottom-right.
    </p>
  </main>

  <footer>
    <a href="https://github.com" target="_blank">Open GitHub</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
